	<script>
		function captchaClear() {
			
			let captcha = document.getElementById('captcha');
			captcha.value = "";

		function checkMoB(val) {

			if (val == 'Y') {

				document.getElementById("hidepin").style.display = "none";
				document.getElementById("hidedist").style.display = "block";

			} else {
				document.getElementById("hidedist").style.display = "none";
				document.getElementById("hidepin").style.display = "block";

			}

		}

		function validateCaptcha() {

			if (document.getElementById('state').value == '-1') {

				Swal.fire('Please Select Valid State First')

				return false;
			}

			var selectedValue = document.getElementById('dist').value;
			var selectedValue1 = document.getElementById('pin').value;

			var option = document.getElementsByName('radiovalue');
			s = option.value;

			if (!(option[0].checked || option[1].checked)) {

				Swal.fire('Please Select At Least One Option')
				return false;
			} else if (option[0].checked) {
				if (selectedValue == '-1') {

					Swal.fire('Please Select District')
					return false;
				}

			} else {
				if (document.getElementById('pin').value == '-1') {

					Swal.fire('Please Select Pin Code')
					return false;
				}

			}
			
			if (document.getElementById('captcha').value == '') {

				Swal.fire('Please Enter captcha code')

				return false;
			}

		}

		$('#state')
				.on(

							var stateId = $(this).val();

							$
									.ajax({
										type : 'GET',
										url : '/PanPSACenters/forms/loadDistByStateId/'
												+ stateId,
										success : function(result) {
											//
											var s = '<option value="-1" selected disabled>Select District</option>';
											for (var i = 0; i < result.length; i++) {
												s += '<option value="' + result[i].distName + '">'
														+ result[i].distName
														+ '</option>';

											}
											$('#dist').html(s);
										}
									});
						});

		$('#state')
